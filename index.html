      align-items: center;
      justify-content: space-between;

    .faq-question:hover {

    .faq-question .q-left {

      color: #0175c2;
      background: #e3effa;
      border-radius: 40px;

      text-align: center;

      margin-top: 2px;

    .faq-question .q-text {

    /* Answer */
    .faq-answer {

      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease;

      background: #fafdff;
      border-top: 1px solid transparent;

    .faq-item.active .faq-answer {
      max-height: 3000px; /* plenty for long answers */

      border-top-color: #dce7f2;

    .faq-answer p {

    .faq-answer p:last-child {

    .faq-answer code {

    .faq-answer pre {

    .faq-answer ul {
      padding-left: 1.6rem;

    }

    .faq-answer ul li {
      margin-bottom: 0.3rem;

    .highlight-box {
      background: #e5f0fa;
      border-left: 4px solid #0175c2;
      padding: 0.7rem 1.2rem;
      border-radius: 8px;
      margin: 0.8rem 0;
    }

    .highlight-box strong {
      color: #0175c2;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.95rem;
      color: #6b7f94;
      border-top: 1px solid #dbe4ee;
      padding-top: 2rem;
    }

    .footer i {
      color: #0175c2;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .header h1 {
        font-size: 1.8rem;
      }
      .faq-question {
        padding: 0.9rem 1.2rem;
      }
      .faq-question .q-text {
        font-size: 0.95rem;
      }
      .faq-answer {
        padding: 0 1.2rem;
      }
      .faq-item.active .faq-answer {
        padding: 1rem 1.2rem 1.4rem;
      }
      .faq-question .q-left {
        gap: 8px;

    /* smooth scroll */
    ::-webkit-scrollbar {
      width: 6px;

      background: #eef3f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #b0c8dd;

    ::-webkit-scrollbar-thumb:hover {

    <!-- Header -->
    <div class="header">
      <h1>
        <i class="fab fa-flutter"></i>
        Flutter Interview Q&A
        <i class="fas fa-code"></i>
      </h1>
      <span class="badge-count">🔥 36 Fresher Questions</span>
      <p>Complete guide — Basics · Dart · Widgets · State · Networking · Testing & more</p>
    </div>

    <!-- FAQ Container -->
    <div id="faqContainer"></div>

    <!-- Footer -->
    <div class="footer">
      <i class="fas fa-graduation-cap"></i> Ace your Flutter interview &nbsp;·&nbsp; Updated for 2026
    </div>
  </div>

  <script>
    // ──────────────────────────────────────────────────────────────
    // MASTER DATA – 36 Questions (includes all previous + 12 new)
    // ──────────────────────────────────────────────────────────────
    const faqData = [
      // ─── PART 1: FLUTTER & DART BASICS (1–5) ──────────────────
      {
        category: 'Basics',
        question: 'What is Flutter, and why is it used?',
        answer: `
          <p><strong>Flutter</strong> is Google's open-source UI toolkit for building natively compiled applications for mobile, web, and desktop from a single codebase.</p>
          <p><strong>Why it's used:</strong></p>
          <ul>
            <li><strong>Single codebase</strong> – write once, run on Android, iOS, web, and desktop.</li>
            <li><strong>Fast development</strong> – hot reload allows you to see changes instantly.</li>
            <li><strong>Expressive UIs</strong> – a rich set of customizable widgets that follow platform-specific design (Material & Cupertino).</li>
            <li><strong>High performance</strong> – compiles directly to native ARM code using its own rendering engine (Skia/Impeller).</li>
          </ul>
          <div class="highlight-box"><strong>💡 Tip:</strong> Flutter does <em>not</em> use OEM widgets; it paints every pixel itself, ensuring consistent UI across platforms.</div>
        `
      },
      {
        category: 'Basics',
        question: 'How does Flutter differ from React Native?',
        answer: `
          <p>While both are cross-platform frameworks, the core difference lies in the <strong>rendering approach</strong>:</p>
          <ul>
            <li><strong>React Native</strong> uses a JavaScript bridge to communicate with native components. It relies on OEM widgets, which can lead to platform-specific inconsistencies and a performance overhead due to the bridge.</li>
            <li><strong>Flutter</strong> does <em>not</em> use a bridge. It compiles to native machine code and uses its own rendering engine (Skia) to draw every pixel. This results in:</li>
            <ul>
              <li>Better performance (no bridge serialization).</li>
              <li>Perfect UI consistency across platforms.</li>
              <li>Faster startup times (AOT compilation).</li>
            </ul>
          </ul>
          <p>Flutter also offers a more reactive and declarative UI model, similar to React but without the bridge overhead.</p>
        `
      },
      {
        category: 'Basics',
        question: 'Why did Google choose Dart for Flutter?',
        answer: `
          <p>Dart was chosen because it provides the best balance of features for a UI framework:</p>
          <ul>
            <li><strong>JIT (Just-In-Time)</strong> compilation enables <strong>hot reload</strong> for blazing fast development cycles.</li>
            <li><strong>AOT (Ahead-Of-Time)</strong> compilation produces highly optimized machine code for production, ensuring smooth performance.</li>
            <li>Dart has a <strong>garbage collector</strong> that handles memory efficiently.</li>
            <li>It is <strong>object-oriented</strong> and easy to learn for developers coming from Java, C#, or JavaScript.</li>
            <li>Dart's rich standard library and strong typing help build large-scale applications.</li>
          </ul>
          <div class="highlight-box"><strong>🔥 Key point:</strong> Dart's ability to do both JIT and AOT makes it uniquely suited for Flutter's needs.</div>
        `
      },
      {
        category: 'Basics',
        question: 'What is the role of the pubspec.yaml file?',
        answer: `
          <p><code>pubspec.yaml</code> is the <strong>project manifest</strong> for Flutter and Dart packages. It defines:</p>
          <ul>
            <li><strong>Metadata</strong> – project name, version, description.</li>
            <li><strong>Dependencies</strong> – both direct and transitive packages (e.g., <code>http</code>, <code>provider</code>).</li>
            <li><strong>Assets</strong> – images, fonts, JSON files, etc., that your app uses.</li>
            <li><strong>Flutter-specific</strong> – such as <code>uses-material-design: true</code>.</li>
          </ul>
          <p>When you run <code>flutter pub get</code>, Flutter downloads all the dependencies listed here.</p>
        `
      },
      {
        category: 'Basics',
        question: 'What is the difference between main() and runApp()?',
        answer: `
          <p><code>main()</code> is the <strong>entry point</strong> of every Dart program. Inside it, you typically call <code>runApp()</code>.</p>
          <p><code>runApp()</code> takes a <code>Widget</code> (usually the root widget of your app) and inflates it, attaching it to the screen. It also sets up the binding between the framework and the platform (e.g., gesture, keyboard, etc.).</p>
          <p>In a Flutter app, the minimal code looks like:</p>
          <pre>void main() { runApp(MyApp()); }</pre>
        `
      },

      // ─── PART 2: DART LANGUAGE (6–9) ──────────────────────────
      {
        category: 'Dart',
        question: 'Explain var, final, and const in Dart.',
        answer: `
          <ul>
            <li><strong><code>var</code></strong> – type is inferred. The variable can be reassigned later (to a value of the same inferred type).</li>
            <li><strong><code>final</code></strong> – assigned only <em>once</em> at <strong>runtime</strong>. Cannot be changed after initialization.</li>
            <li><strong><code>const</code></strong> – a <strong>compile-time</strong> constant. Its value must be known at compile time and is implicitly <code>final</code>.</li>
          </ul>
          <p><strong>Example:</strong></p>
          <pre>var name = 'Alice';   // inferred as String
        final pi = 3.14;    // runtime constant
        const gravity = 9.8; // compile-time constant</pre>
          <div class="highlight-box"><strong>📌 Note:</strong> Use <code>const</code> when possible for performance – it creates a single, canonical instance.</div>
        `
      },
      {
        category: 'Dart',
        question: 'What is Null Safety in Dart?',
        answer: `
          <p><strong>Null Safety</strong> is a language feature that prevents <code>null</code> pointer exceptions by distinguishing between nullable and non-nullable types at compile time.</p>
          <ul>
            <li>By default, variables are <strong>non-nullable</strong> – they cannot be assigned <code>null</code>.</li>
            <li>To allow <code>null</code>, you append <code>?</code> to the type (e.g., <code>String? name</code>).</li>
            <li>The compiler enforces safe handling of nullable values (e.g., you must check for <code>null</code> before using them).</li>
          </ul>
          <p>This dramatically reduces crashes and improves code quality.</p>
        `
      },
      {
        category: 'Dart',
        question: 'What are Future and async/await in Dart?',
        answer: `
          <p><code>Future</code> represents a <strong>potential value</strong> (or error) that will be available at some point in the future – it's used for asynchronous operations.</p>
          <p><code>async</code> and <code>await</code> are syntactic sugar that make asynchronous code look synchronous:</p>
          <ul>
            <li>Mark a function with <code>async</code> to use <code>await</code> inside it.</li>
            <li><code>await</code> pauses execution of the function until the <code>Future</code> completes.</li>
          </ul>
          <p><strong>Example:</strong></p>
          <pre>Future<String> fetchData() async {
            final result = await http.get(...);
            return result.body;
          }</pre>
        `
      },
      {
        category: 'Dart',
        question: 'What is a Stream in Dart?',
        answer: `
          <p>A <code>Stream</code> is a sequence of <strong>asynchronous events</strong> over time. Unlike a <code>Future</code> (which emits a single value), a <code>Stream</code> can emit multiple values (e.g., user taps, location updates, or real-time messages).</p>
          <p>You can listen to a stream using <code>listen()</code> or use <code>async</code>/<code>await</code> with <code>for</code> loops (<code>await for</code>).</p>
          <p><strong>Common use cases:</strong> reading from a socket, handling user input streams, or receiving data from Firebase.</p>
        `
      },

      // ─── PART 3: WIDGETS & UI (10–16) ─────────────────────────
      {
        category: 'Widgets',
        question: 'StatelessWidget vs StatefulWidget – what’s the difference?',
        answer: `
          <ul>
            <li><strong>StatelessWidget</strong> – immutable. The UI depends solely on the configuration (constructor parameters) and does not change after build. No internal state to manage.</li>
            <li><strong>StatefulWidget</strong> – mutable. It has a separate <code>State</code> object that holds data that can change over time. When the state changes, you call <code>setState()</code> to trigger a rebuild.</li>
          </ul>
          <p><strong>When to choose?</strong> Start with <code>StatelessWidget</code>; only use <code>StatefulWidget</code> when you need dynamic behavior (like animations, form fields, or real-time updates).</p>
        `
      },
      {
        category: 'Widgets',
        question: 'What is BuildContext and why is it important?',
        answer: `
          <p><code>BuildContext</code> is a handle to the <strong>location of a widget</strong> in the widget tree. It provides access to:</p>
          <ul>
            <li>Ancestor widgets (using <code>findAncestorWidgetOfExactType()</code>).</li>
            <li>Inherited widgets (like <code>Theme.of(context)</code>, <code>MediaQuery.of(context)</code>).</li>
            <li>Navigator (<code>Navigator.of(context)</code>).</li>
          </ul>
          <p>It is passed to the <code>build</code> method of every widget, acting as the bridge between the widget and its surroundings.</p>
        `
      },
      {
        category: 'Widgets',
        question: 'Expanded vs Flexible – what’s the difference?',
        answer: `
          <p>Both are used inside <code>Row</code>, <code>Column</code>, or <code>Flex</code> to control how children fill available space.</p>
          <ul>
            <li><strong><code>Expanded</code></strong> – forces its child to occupy <em>all</em> remaining free space along the main axis. It is equivalent to <code>Flexible(fit: FlexFit.tight)</code>.</li>
            <li><strong><code>Flexible</code></strong> – gives the child a chance to take space (flex factor) but does <em>not</em> force it to fill all space. You can specify <code>fit: FlexFit.loose</code> (child sizes itself) or <code>tight</code> (fills remaining).</li>
          </ul>
          <p><strong>Use case:</strong> Use <code>Expanded</code> when you want a child to stretch to fill the available space; use <code>Flexible</code> when you want the child to size itself based on its intrinsic dimensions.</p>
        `
      },
      {
        category: 'Widgets',
        question: 'Container vs SizedBox – what’s the difference?',
        answer: `
          <ul>
            <li><strong><code>Container</code></strong> – a versatile widget that combines painting, positioning, and sizing. You can set <code>padding</code>, <code>margin</code>, <code>color</code>, <code>decoration</code> (borders, shadows), and <code>alignment</code>.</li>
            <li><strong><code>SizedBox</code></strong> – a simple box with fixed <code>width</code> and <code>height</code>. It is often used to add empty space (e.g., <code>SizedBox(height: 20)</code>) or to constrain a child's size.</li>
          </ul>
          <p><strong>Rule of thumb:</strong> Use <code>SizedBox</code> for spacing or sizing constraints; use <code>Container</code> when you need decorations or complex layout.</p>
        `
      },
      {
        category: 'Widgets',
        question: 'Why use ListView.builder() instead of a normal ListView?',
        answer: `
          <p><code>ListView.builder()</code> creates children <strong>lazily</strong> – only when they are about to appear on screen. This is crucial for performance when dealing with:</p>
          <ul>
            <li>Very long lists (hundreds or thousands of items).</li>
            <li>Dynamic data where the list length is unknown.</li>
            <li>Memory efficiency – only the visible items are kept in memory.</li>
          </ul>
          <p>In contrast, a normal <code>ListView</code> (with a list of children) builds all children at once, which can cause OOM errors for large lists.</p>
        `
      },
      {
        category: 'Widgets',
        question: 'What does the SafeArea widget do?',
        answer: `
          <p><code>SafeArea</code> adds padding to its child to avoid <strong>system UI elements</strong> like the status bar, notch, home indicator, or rounded corners. This ensures your content is not obscured and remains fully visible.</p>
          <p>It is especially important on devices with notches (like iPhones) or on Android with gesture navigation. You can also control which edges to avoid using the <code>top</code>, <code>bottom</code>, <code>left</code>, <code>right</code> parameters.</p>
        `
      },
      {
        category: 'Widgets',
        question: 'What is the difference between mainAxisAlignment and crossAxisAlignment?',
        answer: `
          <ul>
            <li><strong><code>mainAxisAlignment</code></strong>: Aligns children along the <strong>main axis</strong> (vertical for <code>Column</code>, horizontal for <code>Row</code>). Options: <code>start</code>, <code>end</code>, <code>center</code>, <code>spaceBetween</code>, <code>spaceAround</code>, <code>spaceEvenly</code>.</li>
            <li><strong><code>crossAxisAlignment</code></strong>: Aligns children along the <strong>cross axis</strong> (horizontal for <code>Column</code>, vertical for <code>Row</code>). Options: <code>start</code>, <code>end</code>, <code>center</code>, <code>stretch</code>.</li>
          </ul>
          <p><strong>Example:</strong> In a <code>Column</code>, <code>mainAxisAlignment</code> controls vertical spacing, while <code>crossAxisAlignment</code> controls horizontal alignment (left, right, center).</p>
        `
      },

      // ─── PART 4: STATE MANAGEMENT (17–19) ──────────────────────
      {
        category: 'State Management',
        question: 'How does setState() work?',
        answer: `
          <p><code>setState()</code> is a method provided by the <code>State</code> class. When you call it, you pass a callback that updates the state. The framework then:</p>
          <ul>
            <li>Schedules a rebuild of the widget and its descendants.</li>
            <li>Re-executes the <code>build</code> method with the new state.</li>
          </ul>
          <p>It is the simplest way to manage <strong>ephemeral (local) state</strong> that belongs to a single widget. However, for shared state across multiple widgets, more robust solutions like <code>Provider</code> or <code>Riverpod</code> are recommended.</p>
          <div class="highlight-box"><strong>⚠️ Important:</strong> Always call <code>setState()</code> inside the State class, never from outside.</div>
        `
      },
      {
        category: 'State Management',
        question: 'Name a few state management approaches in Flutter.',
        answer: `
          <ul>
            <li><strong><code>setState()</code></strong> – for local, simple state.</li>
            <li><strong><code>InheritedWidget</code></strong> – the underlying mechanism for propagating data down the tree (used by many libraries).</li>
            <li><strong><code>Provider</code></strong> – a wrapper around <code>InheritedWidget</code>, recommended by the Flutter team for beginners. Easy to use and test.</li>
            <li><strong><code>Riverpod</code></strong> – a compile-safe evolution of Provider, with no reliance on <code>BuildContext</code>.</li>
            <li><strong><code>BLoC</code></strong> (Business Logic Component) – uses streams and events to separate business logic from UI. Great for large, complex apps.</li>
            <li><strong><code>GetX</code></strong> – a lightweight solution with reactivity, routing, and dependency injection.</li>
          </ul>
        `
      },
      {
        category: 'State Management',
        question: 'What does “lifting state up” mean?',
        answer: `
          <p>When multiple widgets need to share the same state, you move (lift) that state to their <strong>nearest common ancestor</strong>. The ancestor holds the state and passes it down to the children via constructors or through an <code>InheritedWidget</code>.</p>
          <p>This pattern avoids duplicating state and keeps the data flow unidirectional, making the app easier to debug and maintain.</p>
        `
      },

      // ─── PART 5: NAVIGATION & LIFECYCLE (20–22) ──────────────
      {
        category: 'Navigation',
        question: 'How do you navigate to a new screen in Flutter?',
        answer: `
          <p>Flutter uses a <strong><code>Navigator</code></strong> widget that manages a stack of routes (pages).</p>
          <ul>
            <li><strong>Push</strong> a new screen: <code>Navigator.push(context, MaterialPageRoute(builder: (context) => NewScreen()));</code></li>
            <li><strong>Pop</strong> to go back: <code>Navigator.pop(context);</code></li>
          </ul>
          <p>For named routes, you can define them in <code>MaterialApp.routes</code> and use <code>Navigator.pushNamed(context, '/details')</code>.</p>
        `
      },
      {
        category: 'Navigation',
        question: 'What are named routes and why use them?',
        answer: `
          <p><strong>Named routes</strong> are routes that have a string identifier. They are defined in the <code>routes</code> parameter of <code>MaterialApp</code>:</p>
          <pre>routes: {
            '/': (context) => HomeScreen(),
            '/details': (context) => DetailsScreen(),
          }</pre>
          <p><strong>Benefits:</strong></p>
          <ul>
            <li>Centralized route management – all routes are declared in one place.</li>
            <li>Cleaner navigation code – just <code>Navigator.pushNamed(context, '/details')</code>.</li>
            <li>Supports deep linking and dynamic arguments via <code>arguments</code> parameter.</li>
          </ul>
        `
      },
      {
        category: 'Lifecycle',
        question: 'What are the key lifecycle methods of a StatefulWidget?',
        answer: `
          <ul>
            <li><strong><code>createState()</code></strong> – called when the widget is inserted into the tree; returns the mutable <code>State</code> object.</li>
            <li><strong><code>initState()</code></strong> – called once immediately after the State object is created. Use it for initializing data, streams, or controllers. <em>Do not</em> call <code>setState()</code> here.</li>
            <li><strong><code>didChangeDependencies()</code></strong> – called when an inherited widget on which this widget depends has changed.</li>

            <li><strong><code>didUpdateWidget()</code></strong> – called when the parent widget changes and rebuilds this widget (e.g., new configuration).</li>
            <li><strong><code>dispose()</code></strong> – called when the widget is permanently removed. <strong>Always cancel streams, timers, and dispose controllers here</strong> to prevent memory leaks.</li>

    const container = document.getElementById('faqContainer');

    faqData.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'faq-item';

      // Question
      const questionDiv = document.createElement('div');
      questionDiv.className = 'faq-question';
      questionDiv.setAttribute('role', 'button');
      questionDiv.setAttribute('aria-expanded', 'false');

      const left = document.createElement('div');
      left.className = 'q-left';

      const numberSpan = document.createElement('span');
      numberSpan.className = 'q-number';
      numberSpan.textContent = index + 1;

      const textSpan = document.createElement('span');
      textSpan.className = 'q-text';
      textSpan.innerHTML = `<span class="category-badge">${item.category}</span> ${item.question}`;

      left.appendChild(numberSpan);
      left.appendChild(textSpan);

      const icon = document.createElement('i');
      icon.className = 'fas fa-chevron-down q-icon';

      questionDiv.appendChild(left);
      questionDiv.appendChild(icon);

      // Answer
      const answerDiv = document.createElement('div');
      answerDiv.className = 'faq-answer';
      answerDiv.innerHTML = item.answer;

      div.appendChild(questionDiv);
      div.appendChild(answerDiv);
      container.appendChild(div);

      // Toggle
      questionDiv.addEventListener('click', function () {
        const isActive = div.classList.contains('active');
        div.classList.toggle('active');
        this.setAttribute('aria-expanded', !isActive);
      });
    });

    // (Optional) open first item by default to show the UX
    // document.querySelector('.faq-item')?.classList.add('active');
